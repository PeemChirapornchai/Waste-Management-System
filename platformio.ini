; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = .
default_envs = esp32s3box

[env:esp32s3box]
platform = espressif32
board = esp32s3box
framework = arduino
monitor_speed = 115200
lib_extra_dirs =
    ./MCU_Camera/lib
    ./shared_lib
build_flags =
    -I MCU_Camera/include
    -D BOARD_HAS_PSRAM ; Enable PSRAM support
    -D ARDUINO_USB_MODE=1 ; Enable USB functionality
    -D ARDUINO_USB_CDC_ON_BOOT=1 ; Enable USB CDC on boot
lib_deps =
    knolleary/PubSubClient@^2.8
build_src_filter =
    -<*>
    +<MCU_Camera/src/>
board_build.arduino.memory_type = qio_opi ; Use QIO flash mode for better performance

[env:esp32-s2-saola-1]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
lib_deps =
    knolleary/PubSubClient@^2.8
    madhephaestus/ESP32Servo
lib_extra_dirs =
    ./MCU_Servo/lib
    ./shared_lib
build_flags =
    -I MCU_Servo/include
build_src_filter =
    -<*>
    +<MCU_Servo/src/>