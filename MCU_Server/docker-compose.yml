services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      # Add your Laptop's Hotspot IP here (192.168.137.1) along with localhost
      - ALLOWED_HOSTS=localhost,127.0.0.1,192.168.137.1
      # MQTT Settings for Cloud Broker (MQTTX)
      - MQTT_BROKER_HOST=broker.emqx.io
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=waste-management-system/command
