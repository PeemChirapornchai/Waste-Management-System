<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Management AI Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #2a2a40; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00e5ff; }
        .feed-container { margin: 20px 0; background: #000; padding: 10px; border-radius: 10px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 5px; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; }
        .stat-box { background: #3b3b58; padding: 15px 30px; border-radius: 10px; width: 40%; }
        .stat-box h3 { margin: 0 0 10px 0; color: #a5a5cd; font-size: 14px; text-transform: uppercase; }
        .stat-box p { margin: 0; font-size: 24px; font-weight: bold; color: #00e5ff; }
    </style>
</head>
<body>

    <div class="container">
        <h1>♻️ AI Waste Sorting Dashboard</h1>
        
        <div class="feed-container">
            <img id="camera-feed" src="/media/latest_frame.jpg" alt="Waiting for camera feed..." onerror="this.alt='Waiting for first frame...'">
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3>Detected Material</h3>
                <p id="type-text">-</p>
            </div>
            <div class="stat-box">
                <h3>System Action</h3>
                <p id="action-text">-</p>
            </div>
        </div>
    </div>

    <script>
        // Function to refresh the image and data every 500 milliseconds
        setInterval(() => {
            // 1. Refresh Image 
            // We add "?time=" with the current timestamp to bypass the browser's cache, forcing it to download the newest image
            document.getElementById('camera-feed').src = '/media/latest_frame.jpg?time=' + new Date().getTime();

            // 2. Fetch Latest Text Data
            fetch('/api/status/')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('type-text').innerText = data.detected_type;
                    document.getElementById('action-text').innerText = data.action_taken;
                })
                .catch(error => console.error('Error fetching data:', error));
        }, 500); // 500ms = 2 frames per second (Great for ESP32)
    </script>

</body>
</html>
